<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/static/simon-bolivar.png">
  <title>The Situation Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..600&family=Libre+Franklin:wght@400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#f4f1e7; --ink:#191712; --ink-strong:#100e09; --muted:#6b6450;
      --faint:#7a7460; --hair:#d3ccba; --rule:#2a261c; --edge:#cfc8b6;
      --accent:#8a1c1c; --serif:'Newsreader',Georgia,serif; --sans:'Libre Franklin',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--paper);color:var(--ink);font-family:var(--serif);
      -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;}
    .paper{max-width:1080px;margin:0 auto;padding:22px 34px 30px;}
    a{color:inherit;text-decoration:none;}

    .ear{font-family:var(--sans);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);line-height:1.45;}
    .ear b{color:var(--ink-strong);font-weight:600;}
    .masthead{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;padding:4px 0;}
    .mast{font-family:'Cinzel',serif;font-weight:700;font-size:40px;letter-spacing:.02em;text-align:center;color:var(--ink-strong);white-space:nowrap;line-height:1;cursor:pointer;}
    .thin{border-top:1px solid var(--rule);}
    .thick{border-top:3px solid var(--ink-strong);}

    .nav-wrap{position:relative;}
    .nav{font-family:var(--sans);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:9px 4px;color:#3b372c;overflow-x:auto;white-space:nowrap;scrollbar-width:none;-ms-overflow-style:none;}
    .nav::-webkit-scrollbar{display:none;}
    .nav-wrap.can-scroll .nav{padding-left:28px;padding-right:28px;}
    .nav a{cursor:pointer;white-space:nowrap;}
    .nav a:hover{color:var(--accent);}
    .nav a.active{color:var(--accent);font-weight:600;}
    .nav .sep{color:#b9b09a;margin:0 8px;}
    .nav-scroll{position:absolute;top:0;bottom:0;width:28px;display:flex;align-items:center;justify-content:center;background:var(--paper);border:none;color:var(--muted);cursor:pointer;z-index:2;opacity:0;transition:opacity .2s;pointer-events:none;padding:0;}
    .nav-scroll-left{left:0;}
    .nav-scroll-right{right:0;}
    .nav-wrap.can-scroll .nav-scroll{opacity:1;pointer-events:auto;}
    .nav-scroll:hover{color:var(--accent);}
    .nav-scroll:disabled{color:var(--hair);cursor:default;}

    .body{display:grid;grid-template-columns:1fr 230px;gap:0;margin-top:16px;}
    .main{padding-right:26px;border-right:1px solid var(--edge);min-width:0;}
    .rail{padding-left:20px;}

    .kicker{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:3px;}
    .sect{font-size:30px;font-weight:600;line-height:1.04;color:var(--ink-strong);}
    .sect i{font-style:italic;font-weight:400;}
    .sect-row{display:flex;align-items:baseline;justify-content:space-between;gap:14px;}
    .markread{font-family:var(--sans);font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);cursor:pointer;white-space:nowrap;}
    .markread:hover{text-decoration:underline;}
    .coverage{font-family:var(--sans);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-top:5px;}

    .dispatches{column-width:300px;column-gap:28px;column-rule:1px solid var(--hair);margin-top:14px;}
    .ev{break-inside:avoid;padding:12px 0;border-top:1px solid var(--hair);}
    .ev:first-child{padding-top:6px;border-top:none;}
    .evt{font-size:16px;line-height:1.45;}
    .lead{font-family:var(--sans);font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-strong);margin-right:2px;}
    .cite{font-family:var(--sans);font-size:10px;font-weight:600;vertical-align:super;color:var(--accent);margin:0 1px;}
    .src{font-family:var(--sans);font-size:10.5px;letter-spacing:.02em;color:var(--faint);margin-top:5px;line-height:1.6;}
    .src .n{color:var(--ink-strong);font-weight:600;}
    .src a{border-bottom:1px solid #c9c0aa;}
    .src a:hover{color:var(--accent);border-color:var(--accent);}

    .rail-h{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-strong);padding-bottom:6px;border-bottom:2px solid var(--ink-strong);}
    .rail-sub{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:16px 0 0;}
    .ri{padding:9px 0;border-top:1px solid var(--hair);cursor:pointer;}
    .ri:hover .w{color:var(--accent);}
    .ri.active .w{color:var(--accent);}
    .ri .w{font-size:17px;font-weight:500;line-height:1.1;}
    .ri .m{font-family:var(--sans);font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-top:2px;}
    .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-left:6px;vertical-align:1px;}

    .colophon{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:center;
      font-family:var(--sans);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:10px 0 0;}
    .colophon b{color:var(--ink-strong);font-weight:600;}
    .colophon a{cursor:pointer;border-bottom:1px solid #c9c0aa;}
    .colophon a:hover{color:var(--accent);}

    .empty{font-family:var(--serif);font-size:17px;color:var(--faint);text-align:center;padding:60px 20px;font-style:italic;}

    .overlay{display:none;position:fixed;inset:0;background:rgba(20,18,12,.5);z-index:100;align-items:center;justify-content:center;}
    .overlay.on{display:flex;}
    .modal{background:var(--paper);border:1px solid var(--ink-strong);border-radius:2px;padding:26px 28px;width:440px;max-width:92vw;max-height:84vh;overflow-y:auto;}
    .modal h2{font-family:var(--serif);font-size:22px;font-weight:600;}
    .modal .close{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);cursor:pointer;}
    .row{display:flex;justify-content:space-between;align-items:center;}
    input[type=text]{flex:1;background:#fff;border:1px solid var(--edge);border-radius:2px;color:var(--ink);
      font-family:var(--sans);font-size:13px;padding:8px 10px;outline:none;}
    input[type=text]:focus{border-color:var(--accent);}
    .btn{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      cursor:pointer;border:1px solid var(--ink-strong);background:var(--ink-strong);color:var(--paper);padding:8px 14px;border-radius:2px;}
    .btn.ghost{background:transparent;color:var(--ink-strong);}
    .btn.sm{padding:5px 10px;font-size:10px;}
    .chan{display:flex;justify-content:space-between;align-items:center;font-family:var(--sans);font-size:13px;padding:7px 0;border-top:1px solid var(--hair);}
    .chan .rm{color:var(--accent);cursor:pointer;font-size:11px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink-strong);
      color:var(--paper);font-family:var(--sans);font-size:12px;letter-spacing:.03em;padding:10px 18px;border-radius:2px;opacity:0;transition:all .2s;z-index:200;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:720px){
      .paper{padding:16px 18px 24px;}
      .masthead{grid-template-columns:1fr;text-align:center;gap:8px;}
      .ear{text-align:center!important;}
      .mast{font-size:30px;white-space:normal;}
      .body{grid-template-columns:1fr;}
      .main{padding-right:0;border-right:none;}
      .rail{padding-left:0;margin-top:24px;border-top:3px solid var(--ink-strong);padding-top:8px;}
    }
  </style>
</head>
<body>

<div class="overlay" id="loading"><div class="modal" style="width:auto;text-align:center;"><div style="font-family:var(--sans);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);">Going to press…</div></div></div>
<div class="toast" id="toast"></div>

<div class="paper">
  <div class="masthead">
    <div class="ear"><b id="m-date">—</b><br><span id="m-updated">Loading…</span></div>
    <div class="mast" onclick="selectReport('unread')" title="Latest">The Situation Monitor</div>
    <div class="ear" style="text-align:right;">Vol. I<br><span id="m-edition">No. 1</span></div>
  </div>
  <div class="thick" style="margin-top:6px;"></div>
  <div class="nav-wrap">
    <button class="nav-scroll nav-scroll-left" id="nav-scroll-left" aria-label="Scroll left"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
    <div class="nav" id="nav"></div>
    <button class="nav-scroll nav-scroll-right" id="nav-scroll-right" aria-label="Scroll right"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
  </div>
  <div class="thin"></div>

  <div class="body">
    <div class="main">
      <div class="kicker" id="kicker">Since you last read</div>
      <div class="sect-row">
        <div class="sect" id="sect">The Catch&#8209;Up</div>
        <span class="markread" id="markread" style="display:none;"></span>
      </div>
      <div class="coverage" id="coverage"></div>
      <div id="content"><div class="empty">Setting the type…</div></div>
    </div>
    <div class="rail">
      <div class="rail-h">The File</div>
      <div id="rail"></div>
    </div>
  </div>

  <div class="thick" style="margin-top:20px;"></div>
  <div class="colophon" id="colophon"><a onclick="openChannels()">Manage channels</a></div>
</div>

<div class="overlay" id="channel-modal">
  <div class="modal">
    <div class="row" style="margin-bottom:18px;"><h2>Channels</h2><span class="close" onclick="closeChannels()">Close</span></div>
    <div class="row" style="gap:8px;margin-bottom:18px;">
      <input type="text" id="new-channel" placeholder="@channelname" onkeydown="if(event.key==='Enter')addChannel()" />
      <button class="btn" onclick="addChannel()">Add</button>
    </div>
    <div id="channel-list"></div>
  </div>
</div>

<script>
  let reports = { unread: null, weeks: [] };
  let status = {};
  let active = null;
  let nation = '__all__';

  async function init(){
    document.getElementById('m-date').textContent = new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    initNavScroll();
    await Promise.all([loadStatus(), loadReports()]);
  }

  async function loadStatus(){
    try{ status = await api('/api/status'); }catch(e){ status = {}; }
    document.getElementById('m-updated').textContent = status.last_refresh_at ? 'Updated ' + fmtTime(status.last_refresh_at) : 'Not yet refreshed';
    document.getElementById('m-edition').textContent = 'No. ' + ((status.weekly_report_count||0)+1);
  }

  async function loadReports(){
    try{ reports = await api('/api/reports'); }
    catch(e){ showToast('Could not load dispatches.'); return; }
    if(!active || !exists(active)) active = reports.unread ? {kind:'unread'} : (reports.weeks[0] ? {kind:'week',key:reports.weeks[0].week_start} : null);
    nation = '__all__';
    renderRail(); renderActive();
  }

  function exists(s){ return s.kind==='unread' ? !!reports.unread : reports.weeks.some(w=>w.week_start===s.key); }
  function activeData(){
    if(!active) return null;
    if(active.kind==='unread') return reports.unread ? reports.unread.data : null;
    const w = reports.weeks.find(x=>x.week_start===active.key); return w ? w.data : null;
  }

  function selectReport(kind, key){
    if(kind==='unread' && !reports.unread) return;
    active = kind==='unread' ? {kind:'unread'} : {kind:'week', key};
    nation = '__all__';
    renderRail(); renderActive();
  }

  function renderRail(){
    let h = '';
    if(reports.unread){
      const a = active && active.kind==='unread' ? ' active' : '';
      h += '<div class="rail-sub" style="margin-top:2px;">Latest</div>';
      h += `<div class="ri${a}" onclick="selectReport('unread')"><div class="w">The Catch&#8209;Up<span class="dot"></span></div><div class="m">Since you last read</div></div>`;
    }
    h += '<div class="rail-sub">The Archive</div>';
    if(reports.weeks.length){
      h += reports.weeks.map(w=>{
        const a = active && active.kind==='week' && active.key===w.week_start ? ' active' : '';
        const n = (w.data.events||[]).length;
        const dot = w.read_at===null ? '<span class="dot"></span>' : '';
        return `<div class="ri${a}" onclick="selectReport('week','${w.week_start}')"><div class="w">${weekLabel(w.week_start)}${dot}</div><div class="m">${n} dispatch${n!==1?'es':''}</div></div>`;
      }).join('');
    } else {
      h += '<div class="m" style="font-family:var(--sans);font-size:11px;color:var(--faint);padding:8px 0;">No editions yet.</div>';
    }
    document.getElementById('rail').innerHTML = h;
  }

  function renderActive(){
    const data = activeData();
    const isUnread = active && active.kind==='unread';
    document.getElementById('kicker').textContent = isUnread ? 'Since you last read' : 'Weekly edition';
    document.getElementById('sect').innerHTML = isUnread ? 'The Catch&#8209;Up <i>— what moved overnight</i>' : weekLabel(active ? active.key : '');

    const mr = document.getElementById('markread');
    if(isUnread && reports.unread){ mr.style.display=''; mr.textContent='Mark as read'; mr.onclick=markCatchupRead; }
    else if(active && active.kind==='week'){
      const w = reports.weeks.find(x=>x.week_start===active.key);
      if(w && w.read_at===null){ mr.style.display=''; mr.textContent='Mark week read'; mr.onclick=markWeekRead; }
      else mr.style.display='none';
    } else mr.style.display='none';

    if(!data || !(data.events||[]).length){
      document.getElementById('nav').innerHTML=''; document.getElementById('coverage').textContent='';
      document.getElementById('content').innerHTML='<div class="empty">No dispatches in this edition yet.</div>';
      renderColophon(data); return;
    }
    renderNav(data);
    const p = data.period||{};
    document.getElementById('coverage').textContent = 'Coverage ' + (p.from?fmtDate(p.from)+' — ':'') + (p.to?fmtDate(p.to):'');
    renderContent(data);
    renderColophon(data);
  }

  function renderNav(data){
    const set = new Set();
    (data.events||[]).forEach(e=>(e.countries||[]).forEach(c=>set.add(c)));
    const names = Array.from(set).sort();
    const item = (id,label)=>`<a class="${nation===id?'active':''}" onclick="setNation('${id.replace(/'/g,"\\'")}')">${escHtml(label)}</a>`;
    let h = item('__all__','All');
    names.forEach(n=>{ h += '<span class="sep">·</span>' + item(n,n); });
    document.getElementById('nav').innerHTML = h;
    updateNavScroll();
  }

  function initNavScroll(){
    const nav=document.getElementById('nav');
    const wrap=nav.closest('.nav-wrap');
    if(!wrap) return;
    nav.addEventListener('wheel',e=>{
      if(nav.scrollWidth<=nav.clientWidth) return;
      if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){
        e.preventDefault();
        nav.scrollLeft+=e.deltaY;
      }
    });
    document.getElementById('nav-scroll-left').addEventListener('click',()=>nav.scrollBy({left:-200,behavior:'smooth'}));
    document.getElementById('nav-scroll-right').addEventListener('click',()=>nav.scrollBy({left:200,behavior:'smooth'}));
    nav.addEventListener('scroll',updateNavScroll);
    window.addEventListener('resize',updateNavScroll);
  }

  function updateNavScroll(){
    const nav=document.getElementById('nav');
    const wrap=nav.closest('.nav-wrap');
    if(!wrap) return;
    const canScroll=nav.scrollWidth>nav.clientWidth+1;
    wrap.classList.toggle('can-scroll',canScroll);
    const leftBtn=document.getElementById('nav-scroll-left');
    const rightBtn=document.getElementById('nav-scroll-right');
    if(!canScroll){ leftBtn.style.display='none'; rightBtn.style.display='none'; return; }
    leftBtn.style.display=nav.scrollLeft>1?'flex':'none';
    rightBtn.style.display=nav.scrollLeft<nav.scrollWidth-nav.clientWidth-1?'flex':'none';
  }

  function setNation(n){ nation=n; const d=activeData(); if(d){renderNav(d);renderContent(d);renderColophon(d);} }

  function renderContent(data){
    let events = data.events||[];
    if(nation!=='__all__') events = events.filter(e=>(e.countries||[]).includes(nation));
    if(!events.length){ document.getElementById('content').innerHTML='<div class="empty">No dispatches for this nation.</div>'; return; }
    document.getElementById('content').innerHTML = '<div class="dispatches">' + events.map(renderEvent).join('') + '</div>';
  }

  function renderEvent(e){
    const sources = (e.sources||[]).map(normSrc);
    const line = (e.countries&&e.countries.length) ? `<span class="lead">${escHtml(e.countries[0])}.</span> ` : '';
    const text = renderCited(e.text||'', sources);
    const src = sources.length ? sources.map((s,i)=>{
      const name = s.url ? `<a href="${escHtml(s.url)}" target="_blank" rel="noopener">${escHtml(s.name)}</a>` : escHtml(s.name);
      return `<span class="n">[${i+1}]</span> ${name}`;
    }).join(' &nbsp; ') : '';
    return `<div class="ev"><p class="evt">${line}${text}</p>${src?`<div class="src">${src}</div>`:''}</div>`;
  }

  function renderCited(text, sources){
    return escHtml(text).replace(/\[(\d+)\]/g,(m,num)=>{
      const s = sources[parseInt(num,10)-1]; if(!s) return '';
      if(s.url) return `<a href="${escHtml(s.url)}" target="_blank" rel="noopener"><sup class="cite">${num}</sup></a>`;
      return `<sup class="cite" title="${escHtml(s.name)}">${num}</sup>`;
    });
  }

  function renderColophon(data){
    const ev = data ? (data.events||[]).length : 0;
    const msgs = data ? (data.message_count||0) : 0;
    const cost = data && data.cost ? data.cost.total_cost_usd : null;
    const model = data ? (data.model||'') : '';
    const ch = status.channel_count||0;
    let h = `<span><b>${ev}</b> events</span><span><b>${msgs}</b> dispatches</span><span><b>${ch}</b> channels</span>`;
    if(status.last_refresh_at) h += `<span>last refresh <b>${fmtTime(status.last_refresh_at)}</b></span>`;
    if(cost!=null) h += `<span><b>$${cost.toFixed(4)}</b></span>`;
    if(model) h += `<span>${escHtml(model)}</span>`;
    h += '<a onclick="openChannels()">Manage channels</a>';
    document.getElementById('colophon').innerHTML = h;
  }

  async function markCatchupRead(){
    try{ await api('/api/mark-read','POST'); active=null; await Promise.all([loadStatus(),loadReports()]); showToast('Catch-up cleared.'); }
    catch(e){ showToast('Failed to mark read.'); }
  }
  async function markWeekRead(){
    if(!active||active.kind!=='week') return;
    try{ await api('/api/reports/'+active.key+'/mark-read','POST'); await Promise.all([loadStatus(),loadReports()]); showToast('Week marked read.'); }
    catch(e){ showToast('Failed to mark read.'); }
  }

  async function openChannels(){ document.getElementById('channel-modal').classList.add('on'); await refreshChannels(); }
  function closeChannels(){ document.getElementById('channel-modal').classList.remove('on'); }
  async function refreshChannels(){
    const list = await api('/api/channels');
    const el = document.getElementById('channel-list');
    el.innerHTML = list.length ? list.map(c=>`<div class="chan"><span>@${escHtml(c.username)}${c.title?' · '+escHtml(c.title):''}</span><span class="rm" onclick="removeChannel('${escHtml(c.username)}')">Remove</span></div>`).join('')
      : '<div style="font-family:var(--sans);font-size:12px;color:var(--faint);padding:8px 0;">No channels yet.</div>';
  }
  async function addChannel(){
    const i = document.getElementById('new-channel'); const u = i.value.trim(); if(!u) return;
    try{ await api('/api/channels','POST',{username:u}); i.value=''; await refreshChannels(); await loadStatus(); showToast('Added @'+u.replace('@','')); }
    catch(e){ showToast('Failed to add channel.'); }
  }
  async function removeChannel(u){
    try{ await api('/api/channels/'+u,'DELETE'); await refreshChannels(); await loadStatus(); showToast('Removed @'+u); }
    catch(e){ showToast('Failed to remove channel.'); }
  }

  async function api(path, method='GET', body=null){
    const opts={method,headers:{'Content-Type':'application/json'}};
    if(body) opts.body=JSON.stringify(body);
    const res=await fetch(path,opts);
    if(!res.ok){ const e=await res.json().catch(()=>({detail:res.statusText})); throw new Error(e.detail||res.statusText); }
    return res.json();
  }
  function normSrc(s){ return typeof s==='string'?{name:s,url:null}:{name:s.name||'',url:s.url||null}; }
  function weekLabel(ws){ if(!ws) return ''; const [y,m,d]=ws.split('-'); return `Week of ${m}/${d}/${y}`; }
  function fmtDate(iso){ if(!iso) return ''; return new Date(iso).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  function fmtTime(iso){ if(!iso) return ''; return new Date(iso).toLocaleString(undefined,{hour:'numeric',minute:'2-digit'}); }
  function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  let toastTimer;
  function showToast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show'; clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='toast',3200); }

  init();
</script>
</body>
</html>
